<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334155"/></marker></defs>

<style>
  .bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2}
  .title{font:700 22px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}
  .label{font:600 13px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}
  .small{font:12px Arial,'Microsoft YaHei',sans-serif;fill:#475569}
  .muted{font:11px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}
  .actor{stroke:#0f172a;stroke-width:1.6;fill:none}
  .usecase{fill:#eff6ff;stroke:#2563eb;stroke-width:1.4}
  .flow{fill:#ecfdf5;stroke:#059669;stroke-width:1.4}
  .warn{fill:#fff7ed;stroke:#ea580c;stroke-width:1.4}
  .classHead{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.3}
  .classBody{fill:#ffffff;stroke:#0284c7;stroke-width:1.3}
  .line{stroke:#334155;stroke-width:1.3;fill:none;marker-end:url(#arrow)}
  .dash{stroke:#64748b;stroke-width:1.2;fill:none;stroke-dasharray:5 4;marker-end:url(#arrow)}
</style>

<rect class="bg" width="980" height="520"/>
<text x="490" y="45" class="title" text-anchor="middle">时序图：登记调用并更新统计</text>
<text x="120" y="90" class="label" text-anchor="middle">前端</text>
<path d="M120,105 V470" class="dash" marker-end="none"/>
<text x="320" y="90" class="label" text-anchor="middle">API 服务</text>
<path d="M320,105 V470" class="dash" marker-end="none"/>
<text x="520" y="90" class="label" text-anchor="middle">账本存储</text>
<path d="M520,105 V470" class="dash" marker-end="none"/>
<text x="720" y="90" class="label" text-anchor="middle">统计服务</text>
<path d="M720,105 V470" class="dash" marker-end="none"/>
<text x="880" y="90" class="label" text-anchor="middle">仪表盘</text>
<path d="M880,105 V470" class="dash" marker-end="none"/>
<path d="M120,150 L320,150" class="line"/>
<text x="220.0" y="142" class="small" text-anchor="middle">提交调用记录</text>
<path d="M320,200 L520,200" class="line"/>
<text x="420.0" y="192" class="small" text-anchor="middle">保存 CallRecord</text>
<path d="M520,245 L320,245" class="line"/>
<text x="420.0" y="237" class="small" text-anchor="middle">返回记录 ID</text>
<path d="M320,290 L720,290" class="line"/>
<text x="520.0" y="282" class="small" text-anchor="middle">重新计算汇总</text>
<path d="M720,335 L320,335" class="line"/>
<text x="520.0" y="327" class="small" text-anchor="middle">返回指标</text>
<path d="M320,385 L880,385" class="line"/>
<text x="600.0" y="377" class="small" text-anchor="middle">刷新状态</text>
<path d="M880,430 L120,430" class="line"/>
<text x="500.0" y="422" class="small" text-anchor="middle">展示费用/缓存命中</text>
</svg>
