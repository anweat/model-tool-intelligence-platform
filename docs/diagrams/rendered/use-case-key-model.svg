<circle cx="900" cy="210" r="12" class="actor"/>
<path d="M900,222 V264 M876,238 H924 M900,264 L878,298 M900,264 L922,298" class="actor"/>
<text x="900" y="322" class="label" text-anchor="middle">模型供应商</text>

