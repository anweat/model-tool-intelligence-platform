<rect x="550" y="150" width="180" height="56" rx="8" class="usecase"/><text x="640.0" y="183.0" class="label" text-anchor="middle">登记 API Key</text>
<rect x="300" y="250" width="180" height="56" rx="8" class="usecase"/><text x="390.0" y="283.0" class="label" text-anchor="middle">脱敏展示 Key</text>
