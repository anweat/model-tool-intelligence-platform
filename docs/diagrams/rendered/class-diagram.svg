<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560">
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#334155"/></marker></defs>

<style>
  .bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2}
  .title{font:700 22px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}
  .label{font:600 13px Arial,'Microsoft YaHei',sans-serif;fill:#0f172a}
  .small{font:12px Arial,'Microsoft YaHei',sans-serif;fill:#475569}
  .muted{font:11px Arial,'Microsoft YaHei',sans-serif;fill:#64748b}
  .actor{stroke:#0f172a;stroke-width:1.6;fill:none}
  .usecase{fill:#eff6ff;stroke:#2563eb;stroke-width:1.4}
  .flow{fill:#ecfdf5;stroke:#059669;stroke-width:1.4}
  .warn{fill:#fff7ed;stroke:#ea580c;stroke-width:1.4}
  .classHead{fill:#e0f2fe;stroke:#0284c7;stroke-width:1.3}
  .classBody{fill:#ffffff;stroke:#0284c7;stroke-width:1.3}
  .line{stroke:#334155;stroke-width:1.3;fill:none;marker-end:url(#arrow)}
  .dash{stroke:#64748b;stroke-width:1.2;fill:none;stroke-dasharray:5 4;marker-end:url(#arrow)}
</style>

<rect class="bg" width="980" height="560"/>
<text x="490" y="45" class="title" text-anchor="middle">类图：模型密钥与调用账本核心对象</text>
<rect x="60" y="100" width="210" height="36" rx="8" class="classHead"/>
<text x="165.0" y="123" class="label" text-anchor="middle">Provider</text>
<rect x="60" y="136" width="210" height="84" rx="0" class="classBody"/>
<text x="74" y="162" class="small" text-anchor="start">id, name, baseUrl</text>
<text x="74" y="186" class="small" text-anchor="start">status, owner</text>
<rect x="340" y="100" width="210" height="36" rx="8" class="classHead"/>
<text x="445.0" y="123" class="label" text-anchor="middle">ApiKey</text>
<rect x="340" y="136" width="210" height="84" rx="0" class="classBody"/>
<text x="354" y="162" class="small" text-anchor="start">id, providerId</text>
<text x="354" y="186" class="small" text-anchor="start">label, maskedKey, status</text>
<rect x="620" y="100" width="260" height="36" rx="8" class="classHead"/>
<text x="750.0" y="123" class="label" text-anchor="middle">Model</text>
<rect x="620" y="136" width="260" height="109" rx="0" class="classBody"/>
<text x="634" y="162" class="small" text-anchor="start">id, providerId, name</text>
<text x="634" y="186" class="small" text-anchor="start">contextWindow, tools</text>
<text x="634" y="210" class="small" text-anchor="start">inputPrice, outputPrice</text>
<rect x="200" y="330" width="260" height="36" rx="8" class="classHead"/>
<text x="330.0" y="353" class="label" text-anchor="middle">CallRecord</text>
<rect x="200" y="366" width="260" height="109" rx="0" class="classBody"/>
<text x="214" y="392" class="small" text-anchor="start">id, modelId, apiKeyId</text>
<text x="214" y="416" class="small" text-anchor="start">inputTokens, outputTokens</text>
<text x="214" y="440" class="small" text-anchor="start">cacheHit, latencyMs</text>
<rect x="560" y="345" width="240" height="36" rx="8" class="classHead"/>
<text x="680.0" y="368" class="label" text-anchor="middle">BillingService</text>
<rect x="560" y="381" width="240" height="74" rx="0" class="classBody"/>
<text x="574" y="407" class="small" text-anchor="start">calculateCost()</text>
<text x="574" y="431" class="small" text-anchor="start">summarizeUsage()</text>
<path d="M270,160 L340,160" class="line"/>
<path d="M550,160 L620,160" class="line"/>
<path d="M750,245 L460,350" class="line"/>
<path d="M460,400 L560,400" class="line"/>
</svg>
