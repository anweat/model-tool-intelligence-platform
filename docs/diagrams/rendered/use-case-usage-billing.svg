<text x="900" y="317" class="label" text-anchor="middle">财务/运营</text>

<rect x="280" y="145" width="190" height="56" rx="8" class="usecase"/><text x="375.0" y="178.0" class="label" text-anchor="middle">登记调用记录</text>
<rect x="560" y="145" width="190" height="56" rx="8" class="usecase"/><text x="655.0" y="178.0" class="label" text-anchor="middle">计算 Token 用量</text>
